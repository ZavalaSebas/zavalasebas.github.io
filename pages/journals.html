<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>journals</title>
  <meta name="theme-color" content="#040e1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Righteous&family=Spectral:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style/main.css" />
  <link rel="stylesheet" href="../style/journals.css" />
</head>
<body>

  <div class="scanlines"></div>
  <div class="water-surface"></div>
  <div class="underwater">
    <div class="light-ray"></div>
    <div class="light-ray"></div>
    <div class="light-ray"></div>
  </div>
  <div class="caustics"></div>
  <div id="bubbles"></div>

  <header class="header">
    <a href="../index.html" class="back-btn" aria-label="Volver">&#8592;</a>
    <h2 class="logo">journals</h2>
    <span></span>
  </header>

  <main>
    <section class="hero">
      <h1 class="hero__title">journals</h1>
      <p class="hero__sub">recuerdos con las personas mas importantes</p>
    </section>

    <section class="journal-grid">
      <a href="jimejournal.html" class="journal-card" style="--card-hue: 190">
        <div class="journal-card__book">
          <div class="journal-card__spine"></div>
          <div class="journal-card__page">
            <span class="journal-card__name">jime</span>
            <span class="journal-card__tag">JS</span>
          </div>
        </div>
      </a>

      <a href="pulguijournal.html" class="journal-card" style="--card-hue: 130">
        <div class="journal-card__book">
          <div class="journal-card__spine"></div>
          <div class="journal-card__page">
            <span class="journal-card__name">pulgui</span>
            <span class="journal-card__tag">P</span>
          </div>
        </div>
      </a>

      <a href="laujournal.html" class="journal-card" style="--card-hue: 340">
        <div class="journal-card__book">
          <div class="journal-card__spine"></div>
          <div class="journal-card__page">
            <span class="journal-card__name">lau</span>
            <span class="journal-card__tag">L</span>
          </div>
        </div>
      </a>
    </section>

    <footer class="footer">
      <div class="footer__divider"></div>
      <p class="footer__text" id="frase-footer"></p>
      <p class="footer__credit">made with love by <a href="https://github.com/ZavalaSebas" target="_blank">ZavalaSebas</a></p>
    </footer>
  </main>

  <nav class="tabbar" aria-label="Navegacion principal">
    <span class="tabbar__indicator" aria-hidden="true"></span>
    <a class="tabbar__item" href="../index.html" aria-label="Inicio">
      <span class="tabbar__ico">&#127968;</span>
      <span class="tabbar__label">Inicio</span>
    </a>
    <a class="tabbar__item active" href="journals.html" aria-label="Journals">
      <span class="tabbar__ico">&#128213;</span>
      <span class="tabbar__label">Journals</span>
    </a>
    <a class="tabbar__item" href="tools.html" aria-label="Tools">
      <span class="tabbar__ico">&#128736;</span>
      <span class="tabbar__label">Tools</span>
    </a>
    <a class="tabbar__item" href="rockola.html" aria-label="Rockola">
      <span class="tabbar__ico">&#127925;</span>
      <span class="tabbar__label">Rockola</span>
    </a>
  </nav>

  <script>
    var frases = [
      "those memories will never fade",
      "never gonna give you up... those memories",
      "to infinity and beyond... the past",
      "i am your memories",
      "may the memories be with you",
      "gotta remember em all",
      "its dangerous to forget alone",
      "remember me before the cold",
      "theres no place like home... in memory",
      "after all tomorrow is another memory"
    ];
    var footerEl = document.getElementById("frase-footer");
    if (footerEl) footerEl.textContent = frases[Math.floor(Math.random() * frases.length)];

    document.addEventListener('DOMContentLoaded', function() {
      var tabs = document.querySelectorAll('.tabbar .tabbar__item');
      var indicator = document.querySelector('.tabbar__indicator');
      tabs.forEach(function(tab) {
        var href = tab.getAttribute('href');
        if (!href) return;
        var file = href.split('/').pop().toLowerCase();
        var currentFile = location.pathname.split('/').pop().toLowerCase();
        if (file === currentFile) tab.classList.add('active');
      });
      if (indicator) {
        var active = document.querySelector('.tabbar .tabbar__item.active') || tabs[0];
        if (active) {
          var rect = active.getBoundingClientRect();
          var parentRect = active.parentElement.getBoundingClientRect();
          var width = rect.width * 0.55;
          var x = rect.left - parentRect.left + (rect.width - width) / 2;
          indicator.style.width = width + 'px';
          indicator.style.transform = 'translateX(' + x + 'px)';
        }
      }
    });
  </script>
</body>
</html>
