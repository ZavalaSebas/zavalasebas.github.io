<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eco</title>
  <meta name="theme-color" content="#040e1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Righteous&family=Spectral:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style/main.css" />
  <link rel="stylesheet" href="../style/mylove.css" />
  <link rel="stylesheet" href="../style/eco.css" />
</head>
<body>

  <div class="scanlines"></div>
  <div class="water-surface"></div>
  <div class="underwater">
    <div class="light-ray"></div>
    <div class="light-ray"></div>
    <div class="light-ray"></div>
  </div>
  <div class="caustics"></div>
  <div id="bubbles"></div>

  <header class="header">
    <a href="mylove.html" class="back-btn" aria-label="Volver a mylove">&#8592;</a>
    <h2 class="logo">eco</h2>
    <span></span>
  </header>

  <section class="diary">
    <h1 class="section-title">deja una nota</h1>
    <div id="thoughts-container"></div>
  </section>

  <div id="secret-note">
    <p id="secret-content"></p>
    <button id="editSecret">&#127787; susurrar algo...</button>
  </div>

  <div class="eco-composer" aria-label="Crear nota">
    <div class="composer-inner">
      <textarea id="thoughtInput" placeholder="escribe algo..." rows="1" maxlength="280" aria-label="Tu nota"></textarea>
      <div class="composer-actions">
        <span id="charCount" aria-live="polite">0/280</span>
        <div class="btn-group">
          <button id="clearThoughts" class="btn btn-danger" aria-label="Borrar todas las notas">&#128465; Borrar</button>
          <button id="saveThought" class="btn btn-primary" aria-label="Guardar nota">&#128172; Publicar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="../js/eco.js"></script>
</body>
</html>
