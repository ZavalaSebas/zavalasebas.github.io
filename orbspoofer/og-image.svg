<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0f14"/>
      <stop offset="100%" style="stop-color:#14161d"/>
    </linearGradient>
    <linearGradient id="blurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7289da"/>
      <stop offset="50%" style="stop-color:#5865F2"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="none" stroke="rgba(88,101,242,0.1)" stroke-width="1"/>
  <circle cx="1100" cy="530" r="250" fill="none" stroke="rgba(88,101,242,0.1)" stroke-width="1"/>
  
  <!-- Logo circle -->
  <circle cx="600" cy="220" r="80" fill="rgba(88,101,242,0.15)" stroke="rgba(88,101,242,0.3)" stroke-width="2"/>
  <text x="600" y="235" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#5865F2" text-anchor="middle">OS</text>
  
  <!-- Title -->
  <text x="600" y="350" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="white" text-anchor="middle">OrbSpoofer</text>
  
  <!-- Subtitle -->
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="24" fill="#8a8e9a" text-anchor="middle">Discord Orb Quest Spoofer</text>
  
  <!-- Feature pills -->
  <rect x="280" y="440" width="160" height="36" rx="18" fill="rgba(88,101,242,0.2)" stroke="rgba(88,101,242,0.4)" stroke-width="1"/>
  <text x="360" y="463" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#7289da" text-anchor="middle">Free &amp; Open Source</text>
  
  <rect x="460" y="440" width="140" height="36" rx="18" fill="rgba(88,101,242,0.2)" stroke="rgba(88,101,242,0.4)" stroke-width="1"/>
  <text x="530" y="463" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#7289da" text-anchor="middle">Quest Auto</text>
  
  <rect x="620" y="440" width="140" height="36" rx="18" fill="rgba(88,101,242,0.2)" stroke="rgba(88,101,242,0.4)" stroke-width="1"/>
  <text x="690" y="463" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#7289da" text-anchor="middle">No Downloads</text>
  
  <!-- Bottom text -->
  <text x="600" y="550" font-family="Arial, sans-serif" font-size="16" fill="#5865F2" text-anchor="middle">github.com/ZavalaSebas/OrbSpoofer</text>
